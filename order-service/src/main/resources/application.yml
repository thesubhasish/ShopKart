server:
  port: 8083

spring:
  application:
    name: order-service

  datasource:
    url: jdbc:mysql://localhost:3306/order_service_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: shopkart
    password: shopkart
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate   # Flyway owns the schema
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: localhost:29092   # host-facing listener from docker-compose (PLAINTEXT_HOST)

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all              # wait for all in-sync replicas - safest option (local cluster has only 1 broker, but this is the production-correct setting)
      properties:
        enable.idempotence: true   # prevents duplicate events on producer retries

    consumer:
      group-id: order-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.shopkart.order.event"
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.shopkart.order.event.StockUpdatedEvent

shopkart:
  kafka:
    topics:
      order-placed: order.placed.events
      stock-updated: stock.updated.events

# Resilience4j circuit breaker guarding the call to product-service. If product-service
# is down or slow, we stop hammering it after a run of failures and fail fast instead -
# this protects order-service's own threads from piling up waiting on a dead dependency.
resilience4j:
  circuitbreaker:
    instances:
      productService:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10          # look at the last 10 calls
        minimum-number-of-calls: 5       # need at least 5 calls before the breaker can trip
        failure-rate-threshold: 50       # trip if >= 50% of those calls failed
        wait-duration-in-open-state: 10s # stay OPEN (fail fast) for 10s before testing again
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        ignore-exceptions:
          - com.shopkart.order.exception.ProductNotFoundException
          - com.shopkart.order.exception.ProductUnavailableException
  retry:
    instances:
      productService:
        max-attempts: 3
        wait-duration: 500ms

# Where Order Service reaches Product Service to validate items and fetch prices.
# Hardcoded URL for now - this is exactly the kind of hop-to-hop call a service
# registry (Eureka) or gateway would normally abstract away. That's a later-day concern.
product-service:
  base-url: http://localhost:8082

logging:
  level:
    com.shopkart.order: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,circuitbreakers
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true
