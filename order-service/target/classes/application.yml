server:
  port: 8083

spring:
  application:
    name: order-service

  datasource:
    url: jdbc:mysql://localhost:3306/order_service_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: shopkart
    password: shopkart
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate   # Flyway owns the schema
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: localhost:29092   # host-facing listener from docker-compose (PLAINTEXT_HOST)
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all              # wait for all in-sync replicas - safest option (local cluster has only 1 broker, but this is the production-correct setting)
      properties:
        enable.idempotence: true   # prevents duplicate events on producer retries

shopkart:
  kafka:
    topics:
      order-placed: order.placed.events

# Where Order Service reaches Product Service to validate items and fetch prices.
# Hardcoded URL for now - this is exactly the kind of hop-to-hop call a service
# registry (Eureka) or gateway would normally abstract away. That's a later-day concern.
product-service:
  base-url: http://localhost:8082

logging:
  level:
    com.shopkart.order: DEBUG
