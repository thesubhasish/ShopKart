server:
  port: 8081

spring:
  application:
    name: user-service

  datasource:
    url: jdbc:mysql://localhost:3306/user_service_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: shopkart
    password: shopkart
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate   # Flyway owns the schema, Hibernate should never auto-create/alter it
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# Custom JWT config (read by JwtService)
jwt:
  secret: "change-this-to-a-long-random-base64-secret-before-production-use-only-for-local-dev"
  expiration-ms: 3600000   # 1 hour

logging:
  level:
    com.shopkart.user: DEBUG
    org.springframework.security: INFO
