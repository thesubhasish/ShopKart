version: '3.8'

services:
  # ---------- MySQL (shared instance, separate DBs per service) ----------
  mysql:
    image: mysql:8.4
    container_name: shopkart-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_USER: shopkart
      MYSQL_PASSWORD: shopkart
      MYSQL_DATABASE: shopkart
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./infra/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "shopkart", "-pshopkart"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------- Kafka (KRaft mode, no Zookeeper needed) ----------
  kafka:
    image: apache/kafka:3.7.0
    container_name: shopkart-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ---------- Kafka UI (visual inspection of topics/messages) ----------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: shopkart-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: shopkart-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  # ---------- Redis (caching, Day 4+) ----------
  redis:
    image: redis:7-alpine
    container_name: shopkart-redis
    ports:
      - "6379:6379"

  # =========================================================================
  # Application services
  #
  # Inside Docker's network, containers reach each other by SERVICE NAME, not
  # "localhost" - "localhost" inside a container refers to that container itself.
  # Every URL below is overridden via environment variables using Spring Boot's
  # relaxed binding (SPRING_DATASOURCE_URL overrides spring.datasource.url, etc.)
  # rather than editing each service's application.yml, so the same jar/image
  # still runs correctly outside Docker with `mvn spring-boot:run` too.
  # =========================================================================

  user-service:
    build: ./user-service
    container_name: shopkart-user-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/user_service_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s   # gives Spring Boot + Flyway time to start before the first check counts

  product-service:
    build: ./product-service
    container_name: shopkart-product-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/product_service_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  order-service:
    build: ./order-service
    container_name: shopkart-order-service
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/order_service_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092   # internal listener, not the host-facing 29092 one
      PRODUCT_SERVICE_BASE_URL: http://product-service:8082
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      product-service:
        condition: service_healthy   # waits for product-service to actually respond, not just for its container to start
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8083/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  inventory-service:
    build: ./inventory-service
    container_name: shopkart-inventory-service
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/inventory_service_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8084/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  api-gateway:
    build: ./api-gateway
    container_name: shopkart-api-gateway
    ports:
      - "8080:8080"
    environment:
      # Indexed override syntax for the routes list in application.yml (index order
      # must match: 0=user-service, 1=product-service, 2=order-service)
      SPRING_CLOUD_GATEWAY_ROUTES_0_URI: http://user-service:8081
      SPRING_CLOUD_GATEWAY_ROUTES_1_URI: http://product-service:8082
      SPRING_CLOUD_GATEWAY_ROUTES_2_URI: http://order-service:8083
    depends_on:
      user-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
      order-service:
        condition: service_healthy

volumes:
  mysql_data:
