version: '3.8'

services:
  # ---------- MySQL (shared instance, separate DBs per service) ----------
  mysql:
    image: mysql:8.4
    container_name: shopkart-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_USER: shopkart
      MYSQL_PASSWORD: shopkart
      MYSQL_DATABASE: shopkart
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./infra/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "shopkart", "-pshopkart"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------- Kafka (KRaft mode, no Zookeeper needed) ----------
  kafka:
    image: apache/kafka:3.7.0
    container_name: shopkart-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ---------- Kafka UI (visual inspection of topics/messages) ----------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: shopkart-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: shopkart-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  # ---------- Redis (caching, Day 4+) ----------
  redis:
    image: redis:7-alpine
    container_name: shopkart-redis
    ports:
      - "6379:6379"

volumes:
  mysql_data:
