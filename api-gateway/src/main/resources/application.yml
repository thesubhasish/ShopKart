server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      # Explicit routes rather than relying on Eureka-based service discovery -
      # we don't have a discovery server in this project, so URIs are hardcoded
      # to localhost ports, same tradeoff as order-service's product-service.base-url.
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**,/api/users/**

        - id: product-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/products/**,/api/categories/**

        - id: order-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/orders/**

      # Global CORS - lets a browser-based frontend (running on a different port,
      # e.g. a React dev server on :3000) call through the gateway without being blocked.
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"

      httpclient:
        connect-timeout: 3000
        response-timeout: 5s

logging:
  level:
    com.shopkart.gateway: DEBUG
    org.springframework.cloud.gateway: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,gateway
  endpoint:
    health:
      show-details: always
