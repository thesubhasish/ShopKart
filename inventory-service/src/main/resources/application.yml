server:
  port: 8084

spring:
  application:
    name: inventory-service

  datasource:
    url: jdbc:mysql://localhost:3306/inventory_service_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: shopkart
    password: shopkart
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: localhost:29092

    consumer:
      group-id: inventory-service
      auto-offset-reset: earliest    # if this consumer group has never run before, start from the oldest message rather than skipping straight to "now"
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.shopkart.inventory.event"
        # order-service's event class lives in a different package (com.shopkart.order.event).
        # We don't share that class across services (see ProductInfo note in order-service) -
        # instead inventory-service has its own local copy with the same field shape, and we
        # tell Jackson to ignore the producer's type header and deserialize straight into ours.
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.shopkart.inventory.event.OrderPlacedEvent

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      properties:
        enable.idempotence: true

shopkart:
  kafka:
    topics:
      order-placed: order.placed.events
      stock-updated: stock.updated.events

logging:
  level:
    com.shopkart.inventory: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health
